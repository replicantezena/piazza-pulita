<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Un'esperienza interattiva poetica: entra nella città nascosta.">
    <title>La Città Nascosta</title>

    <!-- Importazione Font (Cormorant Garamond e Great Vibes) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- Collegamento al CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="index-body">

    <!-- Effetto lanterna -->
    <div class="lanterna" aria-hidden="true"></div>

    <!-- Contenitore Portone Interattivo -->
    <!-- Aggiunto role="button" e tabindex per accessibilità tastiera -->
    <div class="portone-wrapper" id="portone" onclick="apriPortone()" role="button" tabindex="0" aria-label="Apri il portone ed entra nel sito">

        <!-- Le tre ante -->
        <div class="anta sinistra" aria-hidden="true"></div>
        <div class="anta centrale" aria-hidden="true"></div>
        <div class="anta destra" aria-hidden="true"></div>

        <!-- Luce dietro il portone -->
        <div class="portone-luce" aria-hidden="true"></div>

        <!-- Simboli decorativi -->
        <div class="simbolo simbolo-sinistra" aria-hidden="true"></div>
        <div class="simbolo simbolo-centro" aria-hidden="true"></div>
        <div class="simbolo simbolo-destra" aria-hidden="true"></div>

        <!-- Testo "ENTRA" -->
        <div class="entra-portone">ENTRA</div>

        <!-- Poesia laterale -->
        <div class="poesia-destra">
            Le città non esistono<br>
            finché qualcuno non le apre.<br>
            Ogni porta è un respiro,<br>
            ogni varco un destino.
        </div>
    </div>

    <!-- Overlay nero per transizione -->
    <div class="fade-nero" id="fadeNero" aria-hidden="true"></div>

    <!-- Script JavaScript -->
    <script src="js/index.js"></script>
</body>
</html>
