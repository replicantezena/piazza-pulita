<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Municipio — La casa della comunità</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            background: black;
            color: #f5f5f5;
            font-family: "Cormorant Garamond", serif;
        }

        .sfondo {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('img/nebbia-municipio.png');
            background-size: cover;
            background-position: center;
            opacity: 0.35;
            filter: blur(4px);
            z-index: -1;
        }

        .menu-superiore {
            text-align: center;
            margin-top: 2rem;
        }

        .menu-superiore a {
            margin: 0 0.6rem;
            color: #fff;
            text-decoration: none;
            opacity: 0.8;
            transition: 0.3s;
        }

        .menu-superiore a:hover {
            opacity: 1;
            text-shadow: 0 0 8px rgba(255,255,255,0.9);
        }

        .contenitore {
            max-width: 900px;
            margin: 4rem auto;
            padding: 2rem;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            border-radius: 14px;
        }

        h1, h2 {
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        h1 {
            text-align: center;
            margin-bottom: 0.3rem;
            font-size: 2.2rem;
        }

        .sottotitolo {
            text-align: center;
            font-style: italic;
            opacity: 0.9;
            margin-bottom: 1.5rem;
        }

        section {
            margin-bottom: 2.5rem;
        }

        .idea-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
        }

        .idea-box textarea {
            width: 100%;
            padding: 0.7rem;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
            height: 120px;
        }

        .idea-box button {
            margin-top: 1rem;
            padding: 0.7rem 1.4rem;
            background: rgba(255,255,255,0.25);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .idea-box button:hover {
            background: rgba(255,255,255,0.4);
        }

        .idea {
            background: rgba(255,255,255,0.08);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .idea-data {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 0.4rem;
        }

        .torna-indice {
            text-align: center;
            margin-top: 2rem;
        }

        .torna-indice a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            padding: 0.6rem 1.2rem;
            border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .torna-indice a:hover {
            background: rgba(255,255,255,0.15);
            text-shadow: 0 0 10px rgba(255,255,255,1);
        }
    </style>
</head>

<body>

<div class="sfondo"></div>

<div id="menu-container"></div>
<script src="js/menu.js"></script>

<div class="contenitore">

    <h1>Municipio</h1>
    <div class="sottotitolo">
        La casa della comunità e delle decisioni condivise.
    </div>

    <section>
        <h2>Proponi un’idea</h2>
        <div class="idea-box">
            <textarea id="testoIdea" placeholder="Scrivi la tua idea per la città..."></textarea>
            <button onclick="aggiungiIdea()">Invia</button>
        </div>
    </section>

    <section>
        <h2>Idee della comunità (visibili per 7 giorni)</h2>
        <div id="listaIdee"></div>
    </section>

    <div class="torna-indice">
        <a href="piazza.html">Torna alla Piazza</a>
    </div>

</div>

<script>
function aggiungiIdea() {
    const testo = document.getElementById("testoIdea").value.trim();
    if (!testo) return;

    const idea = {
        testo: testo,
        data: Date.now()
    };

    let idee = JSON.parse(localStorage.getItem("ideeMunicipio") || "[]");
    idee.unshift(idea);
    localStorage.setItem("ideeMunicipio", JSON.stringify(idee));

    document.getElementById("testoIdea").value = "";
    mostraIdee();
}

function mostraIdee() {
    const contenitore = document.getElementById("listaIdee");
    contenitore.innerHTML = "";

    let idee = JSON.parse(localStorage.getItem("ideeMunicipio") || "[]");

    const unaSettimana = 7 * 24 * 60 * 60 * 1000;
    const adesso = Date.now();

    idee = idee.filter(i => adesso - i.data < unaSettimana);

    localStorage.setItem("ideeMunicipio", JSON.stringify(idee));

    idee.forEach(i => {
        const div = document.createElement("div");
        div.classList.add("idea");

        const data = new Date(i.data).toLocaleString("it-IT");

        div.innerHTML = `
            <div>${i.testo}</div>
            <div class="idea-data">Pubblicata il ${data}</div>
        `;

        contenitore.appendChild(div);
    });
}

mostraIdee();
</script>

</body>
</html>
