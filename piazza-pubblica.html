<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Piazza Pubblica — La Piazza Pulita</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/piazza-pubblica.css">

    <style>
        body {
            background: black;
            color: #f5f5f5;
            font-family: "Cormorant Garamond", serif;
        }

        /* Nebbia */
        .sfondo-piazza {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('img/nebbia-piazza-pubblica.png');
            background-size: cover;
            background-position: center;
            opacity: 0.35;
            filter: blur(4px);
            z-index: -1;
        }

        /* Menu superiore */
        .menu-superiore {
            text-align: center;
            margin-top: 2rem;
            z-index: 10;
            position: relative;
        }

        .menu-superiore a {
            margin: 0 0.6rem;
            color: #fff;
            text-decoration: none;
            opacity: 0.8;
            transition: 0.3s;
        }

        .menu-superiore a:hover {
            opacity: 1;
            text-shadow: 0 0 8px rgba(255,255,255,0.9);
        }

        /* Contenitore chat */
        .contenitore-chat {
            max-width: 900px;
            margin: 4rem auto;
            padding: 2rem;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            border-radius: 14px;
        }

        .titolo {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            text-shadow: 0 0 10px black;
        }

        .chat-area {
            height: 400px;
            overflow-y: auto;
            padding: 1rem;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

        .messaggio {
            margin-bottom: 1rem;
            padding: 0.8rem;
            background: rgba(255,255,255,0.12);
            border-radius: 8px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            display: flex;
            gap: 0.6rem;
        }

        .input-area input {
            flex: 1;
            padding: 0.8rem;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .input-area button {
            padding: 0.8rem 1.4rem;
            background: rgba(255,255,255,0.25);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .input-area button:hover {
            background: rgba(255,255,255,0.4);
        }
    </style>
</head>

<body class="piazza-body">

    <div class="sfondo-piazza"></div>

    <!-- Menu superiore -->
<div id="menu-container"></div>
<script src="js/menu.js"></script>

    <div class="contenitore-chat">

        <h2 class="titolo">La Piazza Pubblica</h2>

        <div id="chat" class="chat-area">
            <!-- I messaggi compariranno qui -->
        </div>

        <div class="input-area">
            <input type="text" id="messaggio" placeholder="Scrivi qualcosa...">
            <button onclick="inviaMessaggio()">Invia</button>
        </div>

    </div>

    <script src="js/piazza-pubblica.js"></script>
</body>
</html>
